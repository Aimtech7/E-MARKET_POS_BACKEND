name: Release EMMARKET POS

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0.0, v2.0.1

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out Git repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Create Production .env file
      run: |
        echo "LOCAL_MONGOPATH=mongodb://127.0.0.1:27017/emmarket_production" > .env
        echo "CLOUD_MONGOPATH=${{ secrets.CLOUD_MONGOPATH }}" >> .env
        echo "PORT=5500" >> .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Build and Release Electron App
      run: npm run dist -- -p always
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
